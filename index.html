<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EdMetric Standard Setting — Panelist App</title>
<style>
  :root{
    --dark-green:#1A5025;--med-green:#124B21;--light-green:#E8F0E8;--border:#BBCABB;
    --body:#333;--muted:#8a948a;--white:#fff;--bg:#EEF2EE;--warn-bg:#FFF6E0;--warn-bd:#E8C45A;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Verdana,Geneva,sans-serif;color:var(--body);background:#dfe6df;font-size:14px;line-height:1.5}
  .topbar{background:var(--dark-green);color:#fff;display:flex;align-items:center;padding:0 18px;height:60px;border-bottom:4px solid var(--med-green)}
  .logo{width:36px;height:36px;border-radius:8px;background:#fff;color:var(--dark-green);display:flex;align-items:center;justify-content:center;font-family:"Arial Black";font-size:13px;margin-right:12px}
  .wstitle{font-family:"Arial Black",Arial;font-size:15px;line-height:1.1}
  .wstitle small{display:block;font-family:Verdana;font-weight:normal;font-size:11px;color:#c7dcc7}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:12.5px}
  .avatar{width:30px;height:30px;border-radius:50%;background:#cfe0cf;color:var(--dark-green);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px}
  .modeToggle{display:flex;background:#0e3a18;border-radius:8px;overflow:hidden;border:1px solid #2c5a38}
  .modeToggle button{background:none;border:0;color:#bcd3bc;padding:7px 13px;cursor:pointer;font-family:Verdana;font-size:12px}
  .modeToggle button.on{background:#fff;color:var(--dark-green);font-weight:bold}
  .layout{display:flex;min-height:calc(100vh - 60px)}
  .side{width:220px;flex:0 0 220px;background:#fff;border-right:1px solid var(--border);padding:14px 0}
  .side a{display:flex;align-items:center;gap:11px;padding:11px 18px;color:var(--body);cursor:pointer;border-left:4px solid transparent;font-size:13.5px}
  .side a:hover{background:var(--light-green)}
  .side a.active{background:var(--light-green);border-left-color:var(--dark-green);color:var(--dark-green);font-weight:bold}
  .side a.locked{opacity:.45;cursor:not-allowed}
  .side a .lockic{margin-left:auto;font-size:12px}
  .side a .ic{width:18px;text-align:center}
  .content{flex:1;padding:26px 34px;max-width:900px}
  h2.h{font-family:"Arial Black",Arial;color:var(--dark-green);font-size:20px;margin:0 0 4px;padding-bottom:8px;border-bottom:3px solid var(--dark-green)}
  .lede{color:#555;margin:0 0 20px;max-width:660px}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px}
  .card h3{margin:0 0 10px;font-family:"Arial Black";font-size:13px;color:var(--med-green);text-transform:uppercase;letter-spacing:.5px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--border);font-size:13.5px}
  .kv:last-child{border:0}.kv b{color:var(--med-green)}
  .stepper{display:flex;gap:6px;margin:6px 0 4px;flex-wrap:wrap}
  .step{flex:1;min-width:70px;text-align:center;font-size:11.5px;color:var(--muted)}
  .step .bub{height:30px;width:30px;border-radius:50%;margin:0 auto 5px;background:#fff;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:bold;color:var(--muted)}
  .step.done .bub{background:#2E7D46;border-color:#2E7D46;color:#fff}
  .step.cur .bub{background:var(--dark-green);border-color:var(--dark-green);color:#fff;box-shadow:0 0 0 4px var(--light-green)}
  .step.done,.step.cur{color:var(--dark-green);font-weight:bold}
  .cta{display:inline-block;background:var(--dark-green);color:#fff;border:0;border-radius:8px;padding:11px 20px;font-family:Verdana;font-size:14px;font-weight:bold;cursor:pointer;margin:4px 6px 0 0}
  .cta:hover{background:var(--med-green)}
  .cta.ghost{background:#fff;color:var(--dark-green);border:1px solid var(--dark-green)}
  .cta.small{padding:7px 13px;font-size:12.5px}
  .lvl{border-radius:10px;color:#fff;padding:14px 16px;margin-bottom:12px}
  .lvl h4{margin:0 0 6px;font-family:"Arial Black";font-size:15px;display:flex;align-items:center;gap:10px}
  .lvl .pill{background:rgba(255,255,255,.25);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:normal;font-family:Verdana}
  .lvl p{margin:0;font-size:13px;color:rgba(255,255,255,.95)}
  .cuts{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .cutbtn{border:1px solid var(--border);background:#fff;border-radius:20px;padding:7px 14px;cursor:pointer;font-size:12.5px;display:flex;align-items:center;gap:7px}
  .cutbtn .sw{width:12px;height:12px;border-radius:3px}
  .cutbtn.active{border-color:var(--dark-green);background:var(--light-green);font-weight:bold;color:var(--dark-green)}
  .oib{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}
  .oib .hd,.oib .row{display:grid;grid-template-columns:46px 1fr 64px 60px 130px;align-items:center}
  .oib .hd{background:var(--dark-green);color:#fff;font-size:11.5px;font-weight:bold;padding:9px 12px}
  .oib .row{padding:9px 12px;border-top:1px solid #eef1ee;cursor:pointer;font-size:13px}
  .oib .row:hover{background:var(--light-green)}
  .oib .row .pos{font-weight:bold;color:var(--med-green)}
  .oib .row .place{justify-self:end;font-size:11.5px;color:var(--dark-green);border:1px dashed var(--dark-green);border-radius:6px;padding:3px 8px;opacity:0}
  .oib .row:hover .place{opacity:1}
  .bandmark{height:3px;background:repeating-linear-gradient(90deg,var(--dark-green) 0 10px,transparent 10px 18px);position:relative}
  .bandmark span{position:absolute;right:12px;top:-9px;background:var(--dark-green);color:#fff;font-size:10.5px;padding:1px 8px;border-radius:10px}
  .legend{font-size:12px;color:var(--muted);margin-top:8px}
  .q{margin-bottom:18px}
  .q label.ql{display:block;font-weight:bold;color:var(--med-green);margin-bottom:7px;font-size:13.5px}
  .opt{display:block;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:7px;cursor:pointer;font-size:13.5px}
  .opt:hover{background:var(--light-green)}.opt input{accent-color:var(--dark-green);margin-right:9px}
  .opt.sel{border-color:var(--dark-green);background:var(--light-green)}
  textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:Verdana;font-size:13.5px;resize:vertical;min-height:74px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:10px 12px;text-align:center;border:1px solid var(--border)}
  th{background:var(--dark-green);color:#fff;font-size:12px}
  tbody tr:nth-child(even){background:var(--light-green)}
  td.you{font-weight:bold;color:var(--med-green)}
  .tag{display:inline-block;font-size:11px;border-radius:10px;padding:1px 9px;color:#fff}
  .callout{background:var(--light-green);border-left:4px solid var(--dark-green);border-radius:6px;padding:11px 14px;font-size:13px;margin:14px 0}
  .locked{background:#f6f8f6;border:1px dashed var(--border);border-radius:10px;padding:34px;text-align:center;color:var(--muted)}
  .locked .lk{font-size:34px;margin-bottom:8px}
  .new{background:#C9A227;color:#3a2f06;font-size:10px;font-weight:bold;border-radius:10px;padding:1px 8px;margin-left:8px;vertical-align:middle}
  /* facilitator config */
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:12px;color:var(--med-green);font-weight:bold;margin-bottom:4px}
  .fld input[type=text],.fld input[type=number],.fld select{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px;font-family:Verdana;font-size:13.5px}
  .lvlrow{display:grid;grid-template-columns:30px 1fr 1fr 46px 30px;gap:8px;align-items:center;margin-bottom:8px}
  .lvlrow input[type=color]{width:46px;height:34px;border:1px solid var(--border);border-radius:6px;padding:2px;background:#fff}
  .lvlrow .rm{background:#fff;border:1px solid var(--border);border-radius:6px;cursor:pointer;height:34px}
  .lvlrow .rm:hover{background:#fde8e8;border-color:#d99}
  .switch{display:inline-flex;align-items:center;gap:10px;cursor:pointer;font-size:13.5px}
  .switch .track{width:46px;height:26px;border-radius:20px;background:#cfd8cf;position:relative;transition:.2s}
  .switch .track .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch.on .track{background:var(--dark-green)}.switch.on .track .knob{left:23px}
  .bar-chart{display:flex;align-items:flex-end;gap:18px;height:170px;padding:12px 6px;border-bottom:2px solid var(--border)}
  .bar-chart .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .bar-chart .b{width:60%;border-radius:6px 6px 0 0;display:flex;align-items:flex-start;justify-content:center;color:#fff;font-size:11px;font-weight:bold;padding-top:4px}
  .bar-chart .cap{font-size:11px;color:var(--muted);margin-top:6px;text-align:center}
  .hintbar{background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:8px;padding:9px 13px;font-size:12.5px;color:#7a611a;margin-bottom:14px}
  /* login + role gating */
  .login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1A5025,#124B21)}
  .loginbox{background:#fff;border-radius:14px;padding:32px 34px;width:374px;box-shadow:0 14px 40px rgba(0,0,0,.3)}
  .loginbox .lg{width:54px;height:54px;border-radius:12px;background:var(--dark-green);color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Arial Black";font-size:18px;margin:0 auto 14px}
  .loginbox h1{font-family:"Arial Black";color:var(--dark-green);font-size:18px;text-align:center;margin:0 0 4px}
  .loginbox .sub{text-align:center;color:var(--muted);font-size:12.5px;margin-bottom:18px}
  .loginbox label{font-size:12px;color:var(--med-green);font-weight:bold;display:block;margin:12px 0 5px}
  .loginbox input{width:100%;border:1px solid var(--border);border-radius:8px;padding:11px;font-family:Verdana;font-size:14px}
  .roleseg{display:flex;background:var(--light-green);border-radius:9px;overflow:hidden;border:1px solid var(--border)}
  .roleseg button{flex:1;background:none;border:0;padding:9px;cursor:pointer;font-family:Verdana;font-size:13px;color:var(--med-green)}
  .roleseg button.on{background:var(--dark-green);color:#fff;font-weight:bold}
  .note{background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:8px;padding:10px 13px;font-size:12px;margin-top:16px;color:#7a611a}
  .out{color:#cfe0cf;cursor:pointer;border:1px solid #4f7a59;border-radius:6px;padding:5px 10px;font-size:12px}
  .out:hover{background:#0e3a18}
  /* OIB review + item map */
  .reviewbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .reviewbar .prog{flex:1;font-size:12.5px;color:var(--muted)}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .meta .chip{background:var(--light-green);border:1px solid var(--border);border-radius:16px;padding:3px 11px;font-size:11.5px;color:var(--med-green)}
  .meta .chip b{color:var(--dark-green)}
  .itemstem{font-size:15px;color:#222;margin:0 0 14px;line-height:1.55}
  .opts2{list-style:none;margin:0;padding:0}
  .opts2 li{border:1px solid var(--border);border-radius:8px;padding:9px 13px;margin-bottom:7px;font-size:13.5px;background:#fafcfa}
  .opts2 li .ol{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--light-green);color:var(--med-green);text-align:center;line-height:22px;font-size:12px;font-weight:bold;margin-right:9px}
  .imgbox{border:1px dashed var(--border);border-radius:10px;padding:8px;text-align:center;background:#fafcfa}
  .imgbox img{max-width:100%;border-radius:6px}
  .imgmiss{padding:30px;color:var(--muted);font-size:13px}
  .hiddenbox{background:#f6f8f6;border:1px dashed var(--border);border-radius:10px;padding:26px;text-align:center;color:#5d6b5d}
  .hiddenbox .lk{font-size:30px;margin-bottom:8px}
  .qbox{margin-top:18px}
  .qbox .qh{font-weight:bold;color:var(--med-green);font-size:13.5px;margin:0 0 6px}
  .answered{background:#2E7D46;color:#fff;font-size:10px;font-weight:bold;border-radius:10px;padding:1px 8px;margin-left:8px}
  .pending{background:#e7ece7;color:#7a857a;font-size:10px;font-weight:bold;border-radius:10px;padding:1px 8px;margin-left:8px}
  .imrow{cursor:pointer}
  .imrow:hover{background:var(--light-green)!important}
  .acc{border:1px solid var(--border);border-radius:9px;margin-bottom:10px;overflow:hidden;background:#fff}
  .acc>.ah{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;font-size:13.5px}
  .acc>.ah:hover{background:var(--light-green)}
  .acc>.ah .cnt{margin-left:auto;font-size:11.5px;color:var(--muted)}
  .acc .ab{padding:0 14px 12px;display:none}
  .acc.open .ab{display:block}
  .resp{border-top:1px solid #eef1ee;padding:10px 0;font-size:13px}
  .resp .who{font-weight:bold;color:var(--med-green);font-size:12px}
  .resp .ql2{color:#888;font-size:11.5px;margin-top:5px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
  <div class="loginbox">
    <div class="lg" id="loginLogo">EM</div>
    <h1 id="loginTitle">Standard Setting</h1>
    <div class="sub" id="loginSub">Sign in to begin</div>
    <div class="roleseg" id="roleSeg">
      <button id="roleP" class="on" onclick="pickRole('panelist')">Panelist</button>
      <button id="roleF" onclick="pickRole('facilitator')">Facilitator</button>
    </div>
    <label>Email</label><input id="liEmail" placeholder="you@example.org">
    <label>Password</label><input id="liPass" type="password" placeholder="Your password">
    <button class="cta" style="width:100%;margin-top:18px" onclick="doLogin()">Sign in</button>
    <div id="magicWrap" style="margin-top:14px;text-align:center">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">No password? Enter your email above and</div>
      <button class="cta ghost" style="width:100%" onclick="emailMeALink()">Email me a sign-in link</button>
    </div>
    <div class="note" id="loginNote"></div>
  </div>
  <div style="text-align:center;margin-top:16px;font-size:11px;color:var(--muted)">© 2026 EdMetric LLC. All rights reserved.</div>
</div>

<div id="appShell" style="display:none">
<div class="topbar">
  <div class="logo" id="logo">EM</div>
  <div class="wstitle" id="wstitle"></div>
  <div class="right">
    <div class="modeToggle" id="modeToggle">
      <button id="mAdmin" onclick="setMode('admin')">Admin</button>
      <button id="mGroupFac" onclick="setMode('groupfac')">Group&nbsp;fac.</button>
      <button id="mPanelist" class="on" onclick="setMode('panelist')">Panelist</button>
    </div>
    <span class="out" id="refreshBtn" onclick="refreshNow()" title="Reload the latest data">↻ Refresh</span>
    <span class="out" id="pwBtn" onclick="goView('pw')" title="Change your password">Password</span>
    <span class="avatar" id="avatar">CW</span>
    <span class="out" onclick="signOut()">Sign out</span>
  </div>
</div>
<div class="layout">
  <div class="side" id="side"></div>
  <div class="content" id="content"></div>
</div>
</div><!-- /appShell -->

<!-- Libraries are served locally so a blocked CDN (school/office networks) can't break login. CDN is a fallback only. -->
<script src="vendor/supabase.js"></script>
<script>window.supabase||document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>');</script>
<!-- The Excel library (~880KB) is loaded on demand (facilitator import/export only), so panelists don't download it. -->
<script src="supabase-config.js"></script>
<script src="config.js"></script>
<script src="oib.js"></script>
<script>
/* ---------- state ---------- */
const LS_KEY="ss_project_state";
let cfg = loadCfg();
let mode="panelist";
let view="home";
let activeCut=1;
let bookmarks={};       // cut index -> page
let surveyState={q1:null};
let answers={};             // pos -> {measures, harder}  (this panelist's OIB notes)
let visited={};             // pos -> true (items the panelist has opened)
let reviewIdx=0;            // current item in the Review OIB step
let userRole=null;          // 'panelist' | 'facilitator' — set at login
let selectedRole='panelist';// role chosen on the login screen (local mode only)

/* ---------- Supabase ---------- */
const SB = (window.SUPABASE_CONFIG && window.supabase)
  ? window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.publishableKey)
  : null;
const USE_SB = !!SB;
// Load the Excel library only when a facilitator actually needs it (import or export)
let _xlsxPromise=null;
function ensureXLSX(){
  if(window.XLSX) return Promise.resolve(true);
  if(_xlsxPromise) return _xlsxPromise;
  _xlsxPromise=new Promise((res,rej)=>{
    const tryLoad=(src,next)=>{ const s=document.createElement('script'); s.src=src; s.onload=()=>res(true); s.onerror=next; document.head.appendChild(s); };
    tryLoad('vendor/xlsx.full.min.js', ()=> tryLoad('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js', ()=>rej(new Error('Could not load the Excel library.'))));
  });
  return _xlsxPromise;
}
let myPanelistId=null, posToItemId={}, sbRollup=null, sbPanelistCount=null, sbMedians={}, sbDist={}, sbPanelists=[], editingId=null;
let sbTableMed={};         // table_no -> cut_number -> {median_scale,n} for the viewed round
let myRoundCuts={};        // round -> cut_number -> item_pos (this panelist, all rounds)
let carriedForward=false;  // this round's cuts are suggestions from last round, not yet confirmed/saved
let currentGroupId=null;   // the active room context
let currentFormId=null;    // the active form (per-grade booklet) within the room
let viewRound=null;        // facilitator: which round's results to view (defaults to current)
function isAdmin(){return userRole==='admin'||userRole==='facilitator';}     // legacy 'facilitator' = admin
function isGroupFac(){return userRole==='group_facilitator';}
function isFacRole(){return isAdmin()||isGroupFac();}
function vRound(){return (isFacRole()&&viewRound)?viewRound:(cfg.currentRound||1);}  // round whose results are displayed
let ansTimer={};
function wid(){return window.SUPABASE_CONFIG.workshopId;}

function loadCfg(){
  const saved=localStorage.getItem(LS_KEY);
  if(saved){try{ const c=JSON.parse(saved);
      // booklet labels (e.g., the RP label) aren't editable in-app — always take them from the file
      if(window.WORKSHOP_CONFIG&&window.WORKSHOP_CONFIG.booklet){ c.booklet=Object.assign({},c.booklet||{},{rpLabel:window.WORKSHOP_CONFIG.booklet.rpLabel}); }
      return c;
    }catch(e){}}
  return JSON.parse(JSON.stringify(window.WORKSHOP_CONFIG));
}
function persist(){try{localStorage.setItem(LS_KEY,JSON.stringify(cfg));}catch(e){}}
const PROG_KEY="ss_panelist_progress";
function saveProgress(){try{localStorage.setItem(PROG_KEY,JSON.stringify({answers,bookmarks,surveyState,visited}));}catch(e){}}
function loadProgress(){try{const s=localStorage.getItem(PROG_KEY);if(s){const o=JSON.parse(s);if(o.answers)answers=o.answers;if(o.bookmarks)bookmarks=o.bookmarks;if(o.surveyState)surveyState=o.surveyState;if(o.visited)visited=o.visited;}}catch(e){}}
function saveAnswers(){saveProgress();}
function storageOK(){try{const k="__ss_test";localStorage.setItem(k,"1");localStorage.removeItem(k);return true;}catch(e){return false;}}
const STORAGE_OK=storageOK();
const OIB_KEY="ss_oib_items";
function loadOIB(){try{const s=localStorage.getItem(OIB_KEY);if(s){const a=JSON.parse(s);if(Array.isArray(a)&&a.length)return a;}}catch(e){}return (window.OIB_ITEMS||[]).map(x=>x);}
function saveOIB(){try{localStorage.setItem(OIB_KEY,JSON.stringify(oib));}catch(e){}}
let oib=loadOIB();
function nCuts(){return cfg.levels.length-1;}

/* Ordered item booklet: items come from oib.js when present (real data),
   otherwise fall back to a generated placeholder booklet. */
function items(){
  if(oib && oib.length) return oib;
  const out=[];const {firstPage,lastPage,step}=cfg.booklet;let pos=1;
  for(let p=firstPage;p<=lastPage;p+=step){out.push({pos,page:p,strand:"",scorePoint:"1/1",itemType:"",pval:"",brief:"Item "+pos,display:{mode:"hidden"}});pos++;}
  return out;
}
function itemCount(){return items().length;}
function itemAt(pos){return items().find(i=>i.pos===pos);}

/* cuts start UNPLACED — a cut appears only after the panelist places it */
function initBookmarks(){
  bookmarks={};
  for(let c=1;c<=nCuts();c++) bookmarks[c]=null;
}

/* ---------- header ---------- */
function paintHeader(){
  document.getElementById('logo').textContent=cfg.clientInitials||"EM";
  document.getElementById('wstitle').innerHTML=cfg.workshopTitle+"<small>"+cfg.subtitle+"</small>";
  const init=(cfg.panelistName||"").split(" ").map(s=>s[0]).join("").slice(0,2).toUpperCase();
  document.getElementById('avatar').textContent=init||"--";
}

/* ---------- nav ---------- */
const PANELIST_NAV=[
  {k:"home",ic:"⌂",t:"Home"},
  {k:"ald",ic:"☰",t:"Progress Descriptors"},
  {k:"review",ic:"▦",t:"Review Items (OIB)"},
  {k:"itemmap",ic:"☷",t:"Item Map"},

];

function renderSide(){

            : mode==='groupfac' ? FAC_NAV.filter(n=>n.k==='progress'||n.k==='responses'||n.k==='release')

    const click = locked? `lockedMsg('${n.k}')` : `goView('${n.k}')`;
    const tail = locked? '<span class="lockic">🔒</span>' : '';
    return `<a class="${cls}" onclick="${click}"><span class="ic">${n.ic}</span><span>${n.t}</span>${tail}</a>`;
  }).join('');

/* ---- sequential gating: Review (all items) -> Survey -> Bookmarks -> My Cut Scores ---- */
function reviewComplete(){
  const its=items();
  if(cfg.requireOIBComplete===false) return its.every(it=>visited[it.pos]);
  return its.every(it=>{const a=answers[it.pos];return a&&a.measures&&a.measures.trim()&&a.harder&&a.harder.trim();});
}
function surveyComplete(){return surveyState.q1!=null;}
function bookmarksComplete(){for(let c=1;c<=nCuts();c++){if(bookmarks[c]==null)return false;}return true;}
function isLocked(k){
  if(isFacRole()) return false;   // facilitators/admins previewing the panelist view are never gated
  if(k==='survey')   return !reviewComplete();
  if(k==='bookmark') return !(reviewComplete()&&surveyComplete());
  if(k==='cuts')     return !(reviewComplete()&&surveyComplete()&&bookmarksComplete());
  return false;
}
/* panelists can't edit once this round's results are released, or the booklet is closed */
function panelEditLocked(){
  if(userRole!=='panelist') return false;
  if(cfg.formStatus==='closed') return 'closed';
  if(cfg.resultsReleased)       return 'released';
  return false;
}
function editLockMsg(reason){
  return reason==='closed'
    ? 'This booklet is closed. You can view it, but changes are no longer allowed.'
    : 'Results for this round have been released — your cut scores are now locked.';
}
/* panelist: their own cut positions across earlier rounds */
function prevRoundsCard(){
  if(!USE_SB) return '';
  const rounds=Object.keys(myRoundCuts||{}).map(Number).filter(r=>r<cfg.currentRound).sort((a,b)=>a-b);
  if(!rounds.length) return '';

    rows+='<tr><td style="text-align:left">Cut '+c+': '+escHtml(cfg.levels[c-1].name)+' → '+escHtml(cfg.levels[c].name)+'</td>'

  }

/* facilitator: medians broken out by table (only when there is more than one table) */
function tableMediansCard(){
  if(!USE_SB) return '';
  const tables=Object.keys(sbTableMed||{}).sort();
  if(tables.length<=1) return '';   // single table → the whole-room median already covers it
  let head='<th style="text-align:left">Table</th>';
  for(let c=1;c<=nCuts();c++) head+='<th>Cut '+c+'</th>';

    rows+='</tr>';

function lockedMsg(k){
  if(k==='survey')   alert("Finish reviewing every item (both questions) before the survey.");
  else if(k==='bookmark') alert("Complete the round survey before placing bookmarks.");
  else if(k==='cuts')     alert("Place all your bookmarks first.");
}
function countComplete(){return items().filter(it=>{const a=answers[it.pos];return a&&a.measures&&a.measures.trim()&&a.harder&&a.harder.trim();}).length;}
function firstIncomplete(){const its=items();for(let i=0;i<its.length;i++){const a=answers[its[i].pos];if(!(a&&a.measures&&a.measures.trim()&&a.harder&&a.harder.trim()))return i;}return its.length-1;}
function goView(k){
  // panelists can never reach facilitator views
  if((k==='setup'||k==='oibmgr'||k==='people'||k==='groups'||k==='overview'||k==='reports') && !isAdmin()) return;   // admin-only
  if((k==='release'||k==='responses'||k==='progress') && !isFacRole()) return;                         // admin or group facilitator
  if(mode==='panelist' && isLocked(k)){ lockedMsg(k); return; }
  view=k;
  if(USE_SB && k==='overview'){ loadOverviewSB().then(render).catch(e=>{console.error(e);render();}); return; }
  if(USE_SB && k==='progress'){ loadPanelProgressSB().then(render).catch(e=>{console.error(e);render();}); return; }
  if(USE_SB && k==='people'){ loadPanelistsSB().then(render).catch(e=>{console.error(e);render();}); return; }
  if(USE_SB && k==='responses'){ loadResponsesSB().then(render).catch(e=>{console.error(e);render();}); return; }
  if(USE_SB && k==='reports'){ Promise.all([loadReportSB(),loadReportAllSB()]).then(render).catch(e=>{console.error(e);render();}); return; }
  if(USE_SB && (k==='cuts'||k==='release')){ loadMediansSB().then(render).catch(e=>{console.error(e);render();}); return; }
  render();
}
function setMode(m){
  // 'admin' | 'groupfac' | 'panelist' (preview modes for facilitator-type users)
  if(m==='admin' && !isAdmin()) return;
  if(m==='groupfac' && !isFacRole()) return;
  mode=m;
  document.getElementById('mAdmin').classList.toggle('on',m==='admin');
  document.getElementById('mGroupFac').classList.toggle('on',m==='groupfac');
  document.getElementById('mPanelist').classList.toggle('on',m==='panelist');
  view = m==='admin'?'overview' : m==='groupfac'?'progress' : 'home';
  if(m==='admin' && USE_SB){ loadOverviewSB().then(render); return; }
  if(m==='groupfac' && USE_SB){ loadPanelProgressSB().then(render); return; }
  render();
}

function ald(){
  return `<h2 class="h">Progress Descriptors</h2>

/* level index = number of PLACED cuts below this position */
function levelOf(pos){
  let n=0;
  for(let c=1;c<=nCuts();c++){ if(bookmarks[c]!=null && pos>bookmarks[c]) n++; }
  return n;
}
function bookmark(){
  let rows="";
  items().forEach((it,i)=>{
    const lvl=cfg.levels[levelOf(it.pos)];
    rows+=`<div class="row" style="border-left:6px solid ${lvl.color}" onclick="setBm(${it.pos})">
      <span class="pos">${it.pos}</span><span>Item ${String(it.pos).padStart(2,'0')} &mdash; ${it.brief||''}</span>
      <span>${it.scale||cfg.booklet.rpLabel}</span><span>p.${it.page}</span>
      <span class="place">Set Cut ${activeCut} here</span></div>`;
    for(let c=1;c<=nCuts();c++){ if(bookmarks[c]===it.pos){
      rows+=`<div class="bandmark"><span>Cut ${c}: ${cfg.levels[c-1].name} → ${cfg.levels[c].name}</span></div>`;
    }}
  });
  const cutBtns=[];
  for(let c=1;c<=nCuts();c++){
    const placed=bookmarks[c]!=null;
    cutBtns.push(`<div class="cutbtn ${activeCut===c?'active':''}" onclick="pickCut(${c})">
      <span class="sw" style="background:${cfg.levels[c].color}"></span>Cut ${c}
      <span style="color:var(--muted)">${cfg.levels[c-1].name}→${cfg.levels[c].name}</span>
      <span style="margin-left:2px;font-weight:bold;color:${placed?'var(--dark-green)':'#c0392b'}">${placed?'✓ #'+bookmarks[c]:'• not set'}</span></div>`);
  }
  const cur=bookmarks[activeCut];
  const allPlaced=bookmarksComplete();
  const LK=panelEditLocked();
  return `<h2 class="h">Place Bookmarks</h2>
  ${LK?`<div class="hintbar" style="margin-bottom:12px">🔒 ${editLockMsg(LK)}</div>`:''}
  <p class="lede">Pick a cut score, then click the item where that level begins. Cuts are empty until you place them; the booklet recolors as you go. Place all ${nCuts()} to finish.</p>
  ${carriedForward?`<div class="callout" style="background:var(--warn-bg,#fff8e1);border-color:var(--warn-bd,#e8d48a)">⤺ These cuts are carried over from <b>Round ${cfg.currentRound-1}</b> as a starting point. They are <b>not saved yet</b> — review and adjust each one, then <b>Confirm</b> below to record them for Round ${cfg.currentRound}.</div>`:''}
  <div class="cuts">${cutBtns.join('')}</div>
  <div class="oib"><div class="hd"><span>#</span><span>Item</span><span>RP</span><span>Page</span><span></span></div>${rows}</div>
  <div class="legend">Setting <b>Cut ${activeCut}</b> (${cfg.levels[activeCut-1].name} → ${cfg.levels[activeCut].name}) — ${cur!=null?('placed at item '+cur):'<b style="color:#c0392b">not yet placed</b>. Click the item where '+cfg.levels[activeCut].name+' begins.'}</div>
  <button class="cta" onclick="finishBookmarks()" ${allPlaced?'':'disabled'}>${carriedForward?'Confirm my bookmarks &amp; continue':'Save bookmarks &amp; continue'} &rarr;</button>
  ${allPlaced?'':'<div class="legend">Place all '+nCuts()+' cut'+(nCuts()>1?'s':'')+' to continue.</div>'}
  ${prevRoundsCard()}`;
}
function pickCut(c){activeCut=c;render();}
function setBm(pos){
  const L=panelEditLocked(); if(L){ alert(editLockMsg(L)); return; }
  let lo=0, hi=itemCount()+1;          // bound by nearest PLACED neighbours
  for(let c=activeCut-1;c>=1;c--){ if(bookmarks[c]!=null){lo=bookmarks[c];break;} }
  for(let c=activeCut+1;c<=nCuts();c++){ if(bookmarks[c]!=null){hi=bookmarks[c];break;} }
  if(pos<=lo||pos>=hi) return;          // keep cuts strictly ordered
  bookmarks[activeCut]=pos;saveProgress();
  if(USE_SB && !carriedForward) saveBmSB(activeCut);   // while carried-forward, hold saves until Confirm
  render();
}

function survey(){
  const opts=["Very ready","Mostly ready","Somewhat unsure","Not ready"];
  const ready=surveyState.q1!=null;
  const LK=panelEditLocked();
  return `<h2 class="h">Round ${cfg.currentRound} Survey</h2>
  ${LK?`<div class="hintbar" style="margin-bottom:12px">🔒 ${editLockMsg(LK)} Your responses are read-only.</div>`:''}

  <div class="card">
    <div class="q"><label class="ql">Having studied all the items, how ready do you feel to set your bookmarks?</label>
      ${opts.map((o,i)=>`<label class="opt ${surveyState.q1===i?'sel':''}" ${LK?'style="opacity:.55;pointer-events:none"':`onclick="pick(${i})"`}><input type="radio" ${surveyState.q1===i?'checked':''} ${LK?'disabled':''}>${o}</label>`).join('')}</div>

function pick(i){const L=panelEditLocked(); if(L){ alert(editLockMsg(L)); return; } surveyState.q1=i;saveProgress();if(USE_SB)saveSurveySB();render();}
function submitSurvey(){ if(surveyState.q1==null){alert("Please answer the readiness question.");return;} goView('bookmark'); }
async function finishBookmarks(){
  if(!bookmarksComplete()){alert("Place all your bookmarks first.");return;}
  if(USE_SB && carriedForward){           // confirm carried-over cuts: save them all now
    for(let c=1;c<=nCuts();c++){ if(bookmarks[c]!=null) await saveBmSB(c); }

    myRoundCuts[cfg.currentRound]=Object.assign({},bookmarks);
  }
  goView('cuts');

/* My Cut Scores — release-gated median & graphics */
function toScore(pos){return Math.round(380 + (pos-1)*9 + 60);}
function myCutScale(c){
  if(bookmarks[c]==null) return null;
  const it=itemAt(bookmarks[c]);
  return (it && it.scale!=null) ? Number(it.scale) : toScore(bookmarks[c]);
}
function cuts(){
  const released=cfg.resultsReleased;
  let rows="";
  for(let c=1;c<=nCuts();c++){
    const placed=bookmarks[c]!=null;
    const you= placed ? Math.round(myCutScale(c)) : '<span style="color:#c0392b">not placed</span>';
    let medianCell='<span style="color:#bbb">—</span>';
    if(released){
      if(USE_SB){ const m=sbMedians&&sbMedians[c]; medianCell = (m&&m.median_scale!=null) ? Math.round(m.median_scale)+' <span style="color:var(--muted);font-size:11px">(n='+m.n+')</span>' : '<span style="color:#bbb">—</span>'; }
      else { medianCell = Math.round(toScore(Math.round(itemCount()*c/(nCuts()+1)))); }
    }
    rows+=`<tr>
      <td>${cfg.levels[c-1].name} &rarr; ${cfg.levels[c].name}<br><span class="tag" style="background:${cfg.levels[c].color}">Cut ${c}</span></td>
      <td class="you">${you}</td>
      <td>${medianCell}</td></tr>`;
  }
  let graphics;
  if(released){ graphics = USE_SB ? resultsGraphics() : (cfg.showImpact!==false?impactChart():''); }
  else {
    graphics=`<div class="card"><h3>Group results</h3>
      <div class="locked"><div class="lk">🔒</div><b>Results not yet released</b><br>
        Your facilitator will release the group median when the round is complete.</div></div>`;
  }
  return `<h2 class="h">My Cut Scores <span style="font-size:12px;color:var(--muted)">(Round ${cfg.currentRound})</span></h2>
  <p class="lede">Your own recommended cut scores for this round. The group median appears only after your facilitator releases the round.</p>
  <div class="card"><table>
    <thead><tr><th>Cut</th><th>You (round ${cfg.currentRound})</th><th>Group median</th></tr></thead>
    <tbody>${rows}</tbody></table>
    ${released?'':'<div class="callout">Only your own recommendations are visible right now. The group median is hidden until release.</div>'}
  </div>
  ${prevRoundsCard()}
  ${graphics}`;
}
function distChart(dist){
  const N=itemCount();
  let html='';
  let any=false;
  for(let c=1;c<=nCuts();c++){
    const d=(dist&&dist[c])||{};
    const freqs=Object.values(d); const total=freqs.reduce((a,b)=>a+b,0);
    if(total>0)any=true;
    const maxFreq=Math.max(1,...freqs);
    const col=cfg.levels[c].color;
    const barW = N>60?9:(N>35?12:(N>18?18:26));   // fixed width; chart scrolls if needed
    const every = N>60?10:(N>30?5:1);             // sparse x-axis labels for big booklets
    let bars='';
    for(let p=1;p<=N;p++){
      const f=d[p]||0;
      const h=f?Math.round(f/maxFreq*72)+6:2;
      const lab=(p===1||p===N||(p%every===0&&(N-p)>=every))?p:'';
      bars+=`<div style="flex:0 0 ${barW}px;width:${barW}px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end" title="Item ${p}: ${f} panelist${f===1?'':'s'}">
        <div style="font-size:9px;color:var(--med-green);height:12px;font-weight:bold">${f||''}</div>
        <div style="width:80%;height:${h}px;background:${f?col:'#e3e9e3'};border-radius:2px 2px 0 0"></div>
        <div style="font-size:8px;color:var(--muted);margin-top:2px;height:10px">${lab}</div></div>`;
    }
    html+=`<div class="card"><h3 style="margin-bottom:3px">Cut ${c}: ${cfg.levels[c-1].name} → ${cfg.levels[c].name} <span style="font-size:11px;color:var(--muted)">(n=${total})</span></h3>
      <p style="font-size:12px;color:#555;margin:0 0 8px">Number of panelists who placed this cut at each item position.</p>
      <div style="overflow-x:auto;padding-bottom:4px"><div style="display:flex;align-items:flex-end;gap:2px;height:104px;border-bottom:2px solid var(--border);min-width:min-content;width:max-content">${bars}</div></div>
      <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px">item position →</div></div>`;
  }
  if(!any) return `<div class="card"><h3>Distribution of bookmarks</h3><p style="color:var(--muted)">No panelist bookmarks recorded for this round yet.</p></div>`;
  return `<div class="card" style="background:none;border:none;padding:0;margin:0"><h3 style="font-family:'Arial Black';color:var(--dark-green)">Distribution of bookmarks — round ${vRound()}</h3></div>`+html;
}
function spreadGraphic(){
  const ms=[]; for(let c=1;c<=nCuts();c++){ const m=sbMedians&&sbMedians[c]; if(m&&m.median_scale!=null) ms.push({c,m}); }
  if(!ms.length) return `<div class="card"><h3>Group results</h3><p style="color:var(--muted)">No panelist bookmarks recorded for this round yet.</p></div>`;
  let lo=Math.min(...ms.map(x=>Number(x.m.min_scale))), hi=Math.max(...ms.map(x=>Number(x.m.max_scale)));
  if(lo===hi){lo-=10;hi+=10;}
  const pos=v=>((Number(v)-lo)/(hi-lo))*100;
  const bars=ms.map(({c,m})=>{
    const L=pos(m.min_scale),R=pos(m.max_scale),M=pos(m.median_scale),col=cfg.levels[c].color;
    return `<div style="margin:10px 0">
      <div style="font-size:12px;color:var(--med-green);font-weight:bold;margin-bottom:3px">Cut ${c}: ${cfg.levels[c-1].name} → ${cfg.levels[c].name}
        &nbsp;<span style="color:var(--muted);font-weight:normal">median ${Math.round(m.median_scale)}, range ${Math.round(m.min_scale)}–${Math.round(m.max_scale)}, n=${m.n}</span></div>
      <div style="position:relative;height:18px;background:var(--light-green);border:1px solid var(--border);border-radius:9px">
        <div style="position:absolute;left:${L}%;width:${Math.max(2,R-L)}%;top:3px;height:10px;background:${col};opacity:.4;border-radius:6px"></div>
        <div style="position:absolute;left:${M}%;top:0;height:18px;width:3px;background:${col}"></div>
      </div></div>`;
  }).join('');
  return `<div class="card"><h3>Where the panel landed <span class="new">round ${vRound()}</span></h3>
    <p style="font-size:13px;color:#555;margin-top:0">Each bar is the spread of panelist cut scores this round; the line marks the group median. Real workshop data.</p>
    ${bars}</div>`;
}
function impactChart(){
  const real=realImpact();
  const pct = real || demoImpact();
  const tag = real? '<span class="new">live</span>' : '<span class="new">illustrative</span>';
  const note = real
    ? 'Percent of students in each level, from the loaded score distribution and this round&#699;s median cut scores.'
    : 'Illustrative percent in each level (load an impact distribution on OIB / Items for real numbers).';
  const bars=cfg.levels.map((l,i)=>`<div class="col"><div class="b" style="height:${pct[i]*1.4}px;background:${l.color}">${pct[i]}%</div><div class="cap">${l.name}</div></div>`).join('');
  const trows=cfg.levels.map((l,i)=>`<tr><td style="text-align:left"><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${l.color};vertical-align:middle;margin-right:7px"></span>${escHtml(l.name)}</td><td>${pct[i]}%</td></tr>`).join('');
  return `<div class="card"><h3>Impact data ${tag}</h3>
    <p style="font-size:13px;color:#555;margin-top:0">${note}</p>
    <table style="max-width:340px;margin-bottom:14px"><thead><tr><th style="text-align:left">Level</th><th>Percent</th></tr></thead><tbody>${trows}</tbody></table>
    <div class="bar-chart">${bars}</div></div>`;
}
/* Round-specific results: R1 = spread; R2 = impact + spread; R3 = impact only */
function resultsGraphics(){
  const r=vRound(); let g='';
  if(r>=2 && cfg.showImpact!==false) g+=impactChart();
  if(r<=2) g+=distChart(sbDist)+spreadGraphic();
  return g;
}
function demoImpact(){
  // produce N percentages summing ~100 based on number of levels
  const n=cfg.levels.length;const base=Math.floor(100/n);const arr=Array(n).fill(base);
  arr[0]+=8;arr[n-1]-=4;arr[Math.floor(n/2)]+= (100-arr.reduce((a,b)=>a+b,0));return arr;
}

let reportRaw=null;   // {bm:[...], impact:[...]} for the active form
async function loadReportSB(){
  reportRaw=null;
  if(!currentFormId) return;
  const {data:bm}=await SB.from('bookmarks')
    .select('round,cut_number,item_pos,scale_score,panelist_id,panelists(first_name,last_name,table_no)')
    .eq('form_id',currentFormId);
  const {data:imp}=await SB.from('impact_scores').select('scale_score,n_students').eq('form_id',currentFormId);
  reportRaw={bm:bm||[], impact:imp||[]};
}
function _med(a){if(!a.length)return null;const s=[...a].sort((x,y)=>x-y);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function _mean(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;}
function _sd(a){if(a.length<2)return null;const m=_mean(a);return Math.sqrt(a.reduce((s,x)=>s+(x-m)*(x-m),0)/(a.length-1));}
function r1(x){return x==null||isNaN(x)?'':Math.round(x*10)/10;}
function roundCutScale(rnd){const out=[];for(let c=1;c<=nCuts();c++){const v=reportRaw.bm.filter(b=>b.round===rnd&&b.cut_number===c&&b.scale_score!=null).map(b=>+b.scale_score);out.push(_med(v));}return out;}
function impactFor(cutScales){
  const dist=reportRaw.impact; if(!dist||!dist.length) return null;
  const total=dist.reduce((s,x)=>s+(+x.n_students||0),0); if(!total) return null;
  if(!cutScales||cutScales.some(c=>c==null)) return null;
  const pct=[];
  for(let i=0;i<cfg.levels.length;i++){
    const lo=i===0?-Infinity:cutScales[i-1];
    const hi=i===cfg.levels.length-1?Infinity:cutScales[i];
    const n=dist.filter(x=>(+x.scale_score)>=lo && (+x.scale_score)<hi).reduce((s,x)=>s+(+x.n_students||0),0);
    pct.push(100*n/total);
  }
  return pct;
}
function reportTables(){
  if(!reportRaw) return [];
  const R=Math.max(cfg.rounds||1, ...reportRaw.bm.map(b=>b.round||1), 1);
  const nc=nCuts();
  const cutLabel=c=>'Cut '+c+': '+cfg.levels[c-1].name+' → '+cfg.levels[c].name;
  const tables=[];
  // 1) Cut scores by round (median scale)
  (()=>{ const head=['Cut']; for(let r=1;r<=R;r++)head.push('Round '+r); head.push('Final');
    const aoa=[head];
    for(let c=1;c<=nc;c++){ const row=[cutLabel(c)]; let last=null;
      for(let r=1;r<=R;r++){ const m=roundCutScale(r)[c-1]; row.push(m!=null?Math.round(m):''); if(m!=null)last=m; }
      row.push(last!=null?Math.round(last):''); aoa.push(row); }
    tables.push({title:'Cut Scores by Round (median scale score)',aoa}); })();
  // 2) Panelist agreement / spread
  (()=>{ const aoa=[['Round','Cut','n','Median','Min','Max','Range','SD']];
    for(let r=1;r<=R;r++) for(let c=1;c<=nc;c++){
      const v=reportRaw.bm.filter(b=>b.round===r&&b.cut_number===c&&b.scale_score!=null).map(b=>+b.scale_score);
      if(!v.length) continue; const mn=Math.min(...v),mx=Math.max(...v);
      aoa.push([r,c,v.length,r1(_med(v)),r1(mn),r1(mx),r1(mx-mn),r1(_sd(v))]); }
    tables.push({title:'Panelist Agreement / Spread',aoa}); })();
  // 3) Impact data
  (()=>{ const head=['Round',...cfg.levels.map(l=>l.name+' (%)')]; const aoa=[head];
    for(let r=1;r<=R;r++){ const pct=impactFor(roundCutScale(r)); aoa.push(['Round '+r,...(pct?pct.map(p=>r1(p)):cfg.levels.map(()=>'—'))]); }
    tables.push({title:'Impact Data (percent of students by level)',aoa}); })();
  // 4) Medians by table (final round)
  (()=>{ const fr=R;
    const ts=[...new Set(reportRaw.bm.filter(b=>b.round===fr).map(b=>(b.panelists&&b.panelists.table_no)||'—'))].sort();
    const head=['Table']; for(let c=1;c<=nc;c++)head.push('Cut '+c); const aoa=[head];
    ts.forEach(t=>{ const row=['Table '+t];
      for(let c=1;c<=nc;c++){ const v=reportRaw.bm.filter(b=>b.round===fr&&b.cut_number===c&&((b.panelists&&b.panelists.table_no)||'—')===t&&b.scale_score!=null).map(b=>+b.scale_score); row.push(v.length?Math.round(_med(v)):''); }
      aoa.push(row); });
    const rr=['Whole room']; for(let c=1;c<=nc;c++){ const v=reportRaw.bm.filter(b=>b.round===fr&&b.cut_number===c&&b.scale_score!=null).map(b=>+b.scale_score); rr.push(v.length?Math.round(_med(v)):''); }
    aoa.push(rr);
    tables.push({title:'Medians by Table — Final Round '+fr,aoa}); })();
  // 5) Panelist appendix (final round scale per cut)
  (()=>{ const fr=R; const head=['Panelist','Table']; for(let c=1;c<=nc;c++)head.push('Cut '+c); const aoa=[head];
    const seen=new Map(); reportRaw.bm.filter(b=>b.round===fr).forEach(b=>{ if(!seen.has(b.panelist_id))seen.set(b.panelist_id,b.panelists||{}); });
    [...seen.entries()].forEach(([pid,p])=>{ const nm=(((p.first_name||'')+' '+(p.last_name||'')).trim())||'Panelist';
      const row=[nm,p.table_no||'—'];
      for(let c=1;c<=nc;c++){ const b=reportRaw.bm.find(x=>x.panelist_id===pid&&x.round===fr&&x.cut_number===c); row.push(b&&b.scale_score!=null?Math.round(+b.scale_score):''); }
      aoa.push(row); });
    tables.push({title:'Panelist Cut Scores — Final Round '+fr+' (appendix)',aoa}); })();
  return tables;
}

async function loadReportAllSB(){

function reportTablesFor(data){ const s=reportRaw; reportRaw=data; const t=reportTables(); reportRaw=s; return t; }   // reuse the per-form builder
function crossGradeTables(){
  if(!reportAll) return [];
  const nc=nCuts();
  const byCA={}; reportAll.forEach(f=>{ (byCA[f.content_area||'—']=byCA[f.content_area||'—']||[]).push(f); });
  const out=[];
  Object.keys(byCA).sort().forEach(ca=>{
    const forms=byCA[ca].filter(f=>f.bm.length);
    if(!forms.length) return;
    const head=['Grade']; for(let c=1;c<=nc;c++)head.push('Cut '+c+': '+cfg.levels[c-1].name+' → '+cfg.levels[c].name);
    const aoa=[head];
    forms.forEach(f=>{ const maxR=Math.max(1,...f.bm.map(b=>b.round||1)); const row=[f.grade||f.name||'—'];
      for(let c=1;c<=nc;c++){ const v=f.bm.filter(b=>b.round===maxR&&b.cut_number===c&&b.scale_score!=null).map(b=>+b.scale_score); row.push(v.length?Math.round(_med(v)):''); }
      aoa.push(row); });
    out.push({title:'Final Cut Scores by Grade — '+ca, aoa});
  });
  return out;
}

/* ---- Item map importer (Excel/CSV) with column auto-detection ---- */
function imNorm(s){return String(s==null?'':s).replace(/\s+/g,' ').trim().toLowerCase();}
function detectItemMapCols(headers){
  const H=headers.map(imNorm);
  const isQ=h=>(h.indexOf('what does')>=0||h.indexOf('why is')>=0||h.indexOf('more difficult')>=0||h.indexOf('what do you know')>=0);
  function find(keys,avoid){avoid=avoid||[];
    for(let i=0;i<H.length;i++){const h=H[i]; if(isQ(h))continue;
      if(keys.some(k=>h.indexOf(k)>=0)&&!avoid.some(a=>h.indexOf(a)>=0)) return i;}
    return -1;}
  const m={};
  m.order=find(['oib','order position','order no.','order']);
  m.item_id=find(['item_id','item number','itemid']); if(m.item_id<0)m.item_id=find(['item'],['item type']);
  m.scale=find(['rp50','rp ','location','theta','logit','measure']); if(m.scale<0)m.scale=find(['score'],['p(','score pt','scorept','score point']);
  m.score_point=find(['pts','score pt','scorept','score point','points'],['p(']);
  m.standard=find(['content standard','standard']); if(m.standard<0)m.standard=find(['domain']);
  m.item_type=find(['item type','type'],['story']);
  m.key=find(['key','answer','correct']);
  m.pval=find(['p(','p-value','pval','p value']);
  m.content=find(['content_file','content file','image','file','filename','png','jpg']);
  return m;
}
async function onImportItemMap(input){
  const f=input.files[0]; if(!f)return;
  try{ await ensureXLSX(); }catch(e){ alert(e.message); return; }
  let grid; try{ const wb=XLSX.read(await f.arrayBuffer(),{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; grid=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:''}); }
  catch(e){ alert('Could not read file: '+e.message); return; }
  if(!grid||!grid.length){alert('That sheet looks empty.');return;}
  let hr=0;
  // find the header row by matching header WORDS in a cell (not 'oib' anywhere — item-image
  // filenames like "..._OIB1.png" contain 'oib' and were fooling the scan into a data row)
  for(let i=0;i<Math.min(8,grid.length);i++){
    const cells=grid[i].map(imNorm);
    if(cells.some(c=> c==='order'||c==='oib'||c.indexOf('oib order')>=0||c.indexOf('order position')>=0||c.indexOf('order of')>=0||c.indexOf('what does')>=0)){hr=i;break;}
  }
  const headers=grid[hr]; const m=detectItemMapCols(headers);
  if(m.order<0){alert("Couldn't find an order-of-difficulty column (looked for OIB / Order). Please check the header row.");return;}
  const get=(row,k)=>m[k]>=0?row[m[k]]:'';
  const toNum=v=>{const n=parseFloat(v);return isNaN(n)?null:n;};
  const newItems=[];
  for(let i=hr+1;i<grid.length;i++){
    const row=grid[i]; if(!row||row.every(x=>x===''||x==null))continue;
    const ord=toNum(get(row,'order')); if(ord==null)continue;
    const std=String(get(row,'standard')||'').trim(), typ=String(get(row,'item_type')||'').trim();
    newItems.push({
      pos:Math.round(ord), page:Math.round(ord),
      external_id:String(get(row,'item_id')||'').trim()||null,
      scale:toNum(get(row,'scale')),
      scorePoint:String(get(row,'score_point')||'').trim()||'1/1',
      strand:std, itemType:typ, pval:toNum(get(row,'pval')),
      answer_key:String(get(row,'key')||'').trim()||null,
      brief:(std||typ||('Item '+Math.round(ord))).slice(0,60),
      display:{mode:'hidden'},
      _content:String(get(row,'content')||'').trim()
    });
  }
  if(!newItems.length){alert('No item rows found below the header.');return;}
  newItems.sort((a,b)=>a.pos-b.pos);
  const lbl=k=>m[k]>=0?('"'+imNorm(headers[m[k]]).slice(0,28)+'"'):'(none)';
  const msg='Detected columns:\n  order = '+lbl('order')+'\n  item id = '+lbl('item_id')+'\n  scale = '+lbl('scale')+'\n  score point = '+lbl('score_point')+'\n  standard = '+lbl('standard')+'\n  item type = '+lbl('item_type')+'\n  key = '+lbl('key')+'\n\n'+newItems.length+' items found. Import and replace the current booklet?';
  if(!confirm(msg))return;
  oib=newItems; saveOIB(); initBookmarks(); reviewIdx=0; render();
  if(USE_SB){ const ok=await saveItemsSB(); if(ok){ toast('✓ Item map uploaded — '+newItems.length+' items saved for this room'); } else { alert('Imported locally, but the database save failed.'); } }
  else toast('✓ Imported '+newItems.length+' items (local)');
}
async function signImages(){
  if(!USE_SB)return;
  const imgs=oib.filter(it=>it.display&&it.display.mode==='image'&&it.display.path);
  if(!imgs.length)return;
  const paths=[...new Set(imgs.map(it=>it.display.path))];
  const {data,error}=await SB.storage.from('item-images').createSignedUrls(paths,60*60*6); // 6-hour links
  if(error){console.error('sign urls',error);return;}
  const map={}; (data||[]).forEach(d=>{ if(d.signedUrl) map[d.path]=d.signedUrl; });
  imgs.forEach(it=>{ if(map[it.display.path]) it.display.src=map[it.display.path]; });
}
async function clearItemImagesSB(){
  if(!USE_SB)return;
  if(!confirm('Delete ALL uploaded item images from storage and unlink them from items?'))return;
  const {data:list,error}=await SB.storage.from('item-images').list(wid(),{limit:1000});
  if(error){alert('Could not list images: '+error.message);return;}
  const paths=(list||[]).map(o=>wid()+'/'+o.name);
  if(paths.length){ const rm=await SB.storage.from('item-images').remove(paths); if(rm.error){alert('Delete failed: '+rm.error.message);return;} }
  items().forEach(it=>{ if(it.display&&it.display.mode==='image') it.display={mode:'hidden'}; });
  await saveItemsSB(); render();
  alert('Removed '+paths.length+' image file(s) and unlinked them from items.');
}
async function onUploadItemImages(input){
  const files=Array.from(input.files||[]); if(!files.length)return;
  if(!USE_SB){alert('Image upload requires the database connection.');return;}
  const W=wid();
  const byPos={}, byId={};
  items().forEach(it=>{byPos[it.pos]=it; if(it.external_id)byId[String(it.external_id).toLowerCase()]=it;});
  let uploaded=0, matched=0; const unmatched=[];
  for(const f of files){
    const base=f.name.replace(/\.[^.]+$/,'');
    const path=W+'/'+f.name;                       // store the PATH (private bucket)
    const up=await SB.storage.from('item-images').upload(path,f,{upsert:true,contentType:f.type||'image/png'});
    if(up.error){console.error('upload',f.name,up.error); unmatched.push(f.name+' (upload failed: '+up.error.message+')'); continue;}
    uploaded++;
    let it=byId[base.toLowerCase()];
    if(!it){ const mm=base.match(/(\d+)\s*$/); if(mm) it=byPos[parseInt(mm[1],10)]; }
    if(it){ it.display={mode:'image',path:path,alt:'Item '+it.pos}; matched++; }
    else unmatched.push(f.name);
  }
  if(matched){ await saveItemsSB(); await signImages(); }
  render();
  alert('Uploaded '+uploaded+' image(s); linked '+matched+' to items (served via expiring signed URLs).'+(unmatched.length?('\n\nNot linked ('+unmatched.length+'): '+unmatched.slice(0,8).join(', ')+(unmatched.length>8?' …':'')):''));
}

function onImportOIB(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      const arr=Array.isArray(data)?data:(data.items||data.OIB_ITEMS);
      if(!Array.isArray(arr)||!arr.length) throw new Error("Expected an array of items, or {items:[...]}.");
      arr.forEach((it,i)=>{ if(it.pos==null) it.pos=i+1; if(!it.display) it.display={mode:"hidden"}; });
      arr.sort((a,b)=>a.pos-b.pos);
      oib=arr; saveOIB(); initBookmarks(); reviewIdx=0;
      render();
      if(USE_SB){ saveItemsSB().then(ok=>alert("Imported "+arr.length+" items"+(ok?" and saved to the database.":" (local only — database save failed)."))); }
      else { alert("Imported "+arr.length+" items."); }
    }catch(e){ alert("Import failed: "+e.message); }
  };
  r.readAsText(f);
}

function onAttachShot(pos,input){
  const f=input.files[0]; if(!f) return;

}

async function refreshNow(){
  if(!USE_SB) return;
  const btn=document.getElementById('refreshBtn'); if(btn) btn.textContent='↻ …';
  const v=view, m=mode;   // stay on the same screen
  const refreshFormMeta=async()=>{
    if(!currentFormId)return;
    const {data:fm}=await SB.from('forms').select('current_round,rounds,results_released,status,grade,name').eq('id',currentFormId).maybeSingle();
    if(fm){ const f=sbForms.find(x=>x.id===currentFormId); if(f)Object.assign(f,fm);
      cfg.currentRound=fm.current_round||cfg.currentRound; cfg.rounds=fm.rounds||cfg.rounds;
      cfg.resultsReleased=!!fm.results_released; cfg.formStatus=fm.status; }
  };
  try{
    if(isFacRole()){
      // reload the CURRENTLY-SELECTED room/form in place (do NOT snap back to the first form)
      const keepF=currentFormId, keepG=currentGroupId;
      if(keepG) await loadFormsSB(keepG);
      if(keepF && sbForms.find(f=>f.id===keepF)) await loadFormContext(keepF);
      else await refreshFormMeta();
      if(isAdmin()){ try{ await loadOverviewSB(); }catch(e){} }
      try{ await loadPanelProgressSB(); }catch(e){}
      await loadMediansSB();
    } else {
      const prevRound=cfg.currentRound;
      await refreshFormMeta();
      if(cfg.currentRound!==prevRound){ try{ await loadProgressSB(); }catch(e){} }  // new round → carry forward
      await loadMediansSB();
    }
    view=v; mode=m; render();
  }catch(e){ console.error('refresh',e); }
  finally{ const b=document.getElementById('refreshBtn'); if(b) b.textContent='↻ Refresh'; }
}

  if(!USE_SB || _autoRefreshTimer) return;

    try{
      if(userRole==='panelist'){
        if(!currentFormId) return;
        const {data:fm}=await SB.from('forms').select('current_round,results_released,status').eq('id',currentFormId).maybeSingle();
        if(!fm) return;
        const changed = (!!fm.results_released)!==!!cfg.resultsReleased
                     || (fm.current_round||1)!==cfg.currentRound
                     || (fm.status||'active')!==(cfg.formStatus||'active');
        if(changed){ await refreshNow(); toast('Updated by your facilitator.'); }
      } else if(isFacRole()){
        // quietly live-update the dashboard being viewed; re-render ONLY when something changed
        // (no form switch, no scroll jump when nothing's new)
        if(view==='progress'){
          await loadPanelProgressSB();
          const sig='p|'+(sbPanelProgress||[]).map(r=>r.name+':'+r.items_complete+':'+r.cuts_placed+':'+(r.study_done?1:0)).join('|')+'|'+(sbSurvey||[]).length;

async function loadFromSupabase(){
  const u=(await SB.auth.getUser()).data.user; if(!u){userRole=null;return;}
  const W=wid();
  const {data:pan,error:pe}=await SB.from('panelists').select('*').eq('workshop_id',W).eq('auth_user_id',u.id).maybeSingle();
  if(pe) throw new Error(pe.message);
  if(!pan){ userRole=null; return; }
  if(pan.role==='panelist' && pan.status==='disabled'){ await SB.auth.signOut(); throw new Error('Your access to this workshop has been closed.'); }
  userRole=pan.role; myPanelistId=pan.id;
  cfg.panelistName=((pan.first_name||'')+' '+(pan.last_name||'')).trim()||pan.email;
  cfg.contentArea=pan.content_area||cfg.contentArea; cfg.grade=pan.grade||cfg.grade; cfg.tableNo=pan.table_no||cfg.tableNo;
  const {data:ws}=await SB.from('workshops').select('*').eq('id',W).single();
  if(ws){cfg.workshopTitle=ws.title;cfg.subtitle=ws.subtitle;cfg.rounds=ws.rounds;cfg.currentRound=ws.current_round;cfg.resultsReleased=ws.results_released;cfg.requireOIBComplete=ws.require_oib_complete;cfg.showImpact=ws.show_impact!==false;
    if(ws.content_areas&&ws.content_areas.length)cfg.contentAreas=ws.content_areas;
    if(ws.grades&&ws.grades.length)cfg.grades=ws.grades;
    if(ws.greeting)cfg.greeting=ws.greeting;
    if(ws.grade_label)cfg.gradeLabel=ws.grade_label;
    if(ws.item_map_columns)cfg.itemMapColumns=ws.item_map_columns;}
  const {data:lv}=await SB.from('achievement_levels').select('*').eq('workshop_id',W).order('ordinal');
  if(lv&&lv.length) cfg.levels=lv.map(l=>({name:l.name,short:l.short_label,color:l.color,descriptor:l.descriptor}));
  await loadGroupsSB();
  // establish the group/room context: a panelist's own group, else the first group
  let gid = pan.group_id || (sbGroups[0] && sbGroups[0].id) || null;
  await loadGroupContext(gid);
  await loadProgressSB();
}

async function loadProgressSB(){
  const idToPos={}; oib.forEach(it=>idToPos[it.id]=it.pos);
  answers={};
  const {data:resp}=await SB.from('oib_responses').select('item_id,measures,why_harder').eq('panelist_id',myPanelistId).eq('form_id',currentFormId);
  (resp||[]).forEach(x=>{const p=idToPos[x.item_id]; if(p!=null)answers[p]={measures:x.measures||'',harder:x.why_harder||''};});
  bookmarks={}; for(let c=1;c<=nCuts();c++)bookmarks[c]=null;
  const {data:bm}=await SB.from('bookmarks').select('cut_number,item_pos').eq('panelist_id',myPanelistId).eq('form_id',currentFormId).eq('round',cfg.currentRound);
  (bm||[]).forEach(x=>{bookmarks[x.cut_number]=x.item_pos;});
  // carry forward: if this round has no bookmarks yet, show the previous round's as
  // editable SUGGESTIONS (not saved → they don't count until the panelist confirms)
  carriedForward=false;
  const anyThisRound=Object.values(bookmarks).some(v=>v!=null);
  if(!anyThisRound && cfg.currentRound>1 && !panelEditLocked()){
    const {data:prev}=await SB.from('bookmarks').select('cut_number,item_pos').eq('panelist_id',myPanelistId).eq('form_id',currentFormId).eq('round',cfg.currentRound-1);
    if(prev&&prev.length){ prev.forEach(x=>{bookmarks[x.cut_number]=x.item_pos;}); carriedForward=true; }
  }
  // load this panelist's cuts across ALL rounds (for the "earlier rounds" reference)
  myRoundCuts={};
  const {data:allbm}=await SB.from('bookmarks').select('round,cut_number,item_pos').eq('panelist_id',myPanelistId).eq('form_id',currentFormId);
  (allbm||[]).forEach(x=>{(myRoundCuts[x.round]=myRoundCuts[x.round]||{})[x.cut_number]=x.item_pos;});
  surveyState={q1:null};
  const {data:sv}=await SB.from('survey_responses').select('question_key,answer').eq('panelist_id',myPanelistId).eq('form_id',currentFormId).eq('round',cfg.currentRound);

  sbMedians={}; sbDist={}; sbImpact=[]; sbTableMed={};

  const {data,error}=await SB.rpc('cut_medians',{frm:currentFormId,rnd:R});

  }

  if(de){console.error('distribution',de);} else {(dd||[]).forEach(r=>{(sbDist[r.cut_number]=sbDist[r.cut_number]||{})[r.item_pos]=r.freq;});}

/* compute % per level from the loaded score distribution + this round's median cuts */
function realImpact(){
  if(!sbImpact||!sbImpact.length) return null;
  const cuts=[]; for(let c=1;c<=nCuts();c++){ const m=sbMedians&&sbMedians[c]; cuts.push(m&&m.median_scale!=null?Number(m.median_scale):null); }
  if(cuts.some(x=>x==null)) return null;
  const total=sbImpact.reduce((a,x)=>a+(Number(x.n_students)||0),0);
  if(!total) return null;
  const pct=[];
  for(let i=0;i<cfg.levels.length;i++){
    const lo=(i===0)?-Infinity:cuts[i-1];
    const hi=(i===cfg.levels.length-1)?Infinity:cuts[i];
    const cnt=sbImpact.reduce((a,x)=>{const s=Number(x.scale_score); return a+((s>=lo&&s<hi)?(Number(x.n_students)||0):0);},0);
    pct.push(Math.round(cnt/total*100));
  }
  return pct;
}

let _toastT=null;
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--dark-green);color:#fff;padding:11px 20px;border-radius:8px;font-size:14px;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.3)';document.body.appendChild(t);}
  t.textContent=msg; t.style.display='block';
  clearTimeout(_toastT); _toastT=setTimeout(()=>{t.style.display='none';},2600);
}

async function deleteFormSB(fid){

    (nb?('\n\n⚠ '+nb+' of '+np+' panelist(s) have bookmarks on this form.'):'')+

async function saveItemsSB(){
  const W=wid();
  const rows=items().map(it=>({workshop_id:W,group_id:currentGroupId,form_id:currentFormId,pos:it.pos,page:it.page,scale:it.scale,strand:it.strand,score_point:it.scorePoint,item_type:it.itemType,pval:it.pval,brief:it.brief,
    external_id: it.external_id||null, answer_key: it.answer_key||null,
    display_mode:it.display?it.display.mode:'hidden',
    display_json: (it.display&&it.display.mode==='json')? Object.assign({stem:it.display.stem||''}, it.display.options?{options:it.display.options}:{}) : null,
    image_path: (it.display&&it.display.mode==='image')? (it.display.path||it.display.src) : null}));
  // remove any items in this form that are no longer in the imported map (e.g., items you deleted)
  const positions=rows.map(r=>r.pos);
  if(positions.length){
    const {error:de}=await SB.from('items').delete().eq('form_id',currentFormId).not('pos','in','('+positions.join(',')+')');
    if(de) console.error('prune old items',de);
  }
  const {error}=await SB.from('items').upsert(rows,{onConflict:'form_id,pos'});
  if(error){alert('Items save failed: '+error.message);return false;}
  return true;
}

async function invitePanelist(email){
  if(!email)return;
  const {error}=await SB.auth.signInWithOtp({email,options:{shouldCreateUser:true,emailRedirectTo:window.location.href}});
  if(error){alert('Invite failed: '+error.message);return;}

async function inviteAllPanelists(){
  const targets=sbPanelists.filter(p=>p.role==='panelist' && p.email);
  if(!targets.length){ alert('No panelists with an email address to invite.'); return; }
  if(!confirm('Email a sign-in link to all '+targets.length+' panelist(s)?\n\nNote: if custom SMTP (Brevo) isn’t set up, the built-in email is rate-limited — only a few will go out per hour.')) return;
  let ok=0, fail=0; const errs=[];
  for(const p of targets){
    const {error}=await SB.auth.signInWithOtp({email:p.email,options:{shouldCreateUser:true,emailRedirectTo:window.location.href}});
    if(error){ fail++; if(errs.length<4) errs.push(p.email+': '+error.message); } else { ok++; }
    await new Promise(r=>setTimeout(r,400));   // gentle pacing
  }
  alert('Sign-in links sent: '+ok+' ok'+(fail?(', '+fail+' failed'):'')+'.'
    +(fail?('\n\nFirst failures:\n'+errs.join('\n')+'\n\nFailures are usually email rate limits — set up custom SMTP (Brevo) to reach the whole panel reliably.'):''));
}
function downloadPanelistTemplate(){
  const csv="first_name,last_name,email,email2,content_area,grade,table_no,role\nJane,Smith,jane.smith@example.school.nz,,Reading,Years 3-4,1,panelist\n";
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="panelist_template.csv";a.click();
}
function parseCSV(text){
  const rows=[];let i=0,field='',row=[],inq=false;
  while(i<text.length){const c=text[i];
    if(inq){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inq=false; } else field+=c; }
    else { if(c==='"')inq=true; else if(c===','){row.push(field);field='';} else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(field);field='';rows.push(row);row=[]; } else field+=c; }
    i++;
  }
  if(field!==''||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(x=>(x||'').trim()!==''));
}
async function onImportPanelistsCSV(input){
  const f=input.files[0]; if(!f)return;
  let text; try{ text=await f.text(); }catch(e){ alert('Could not read file.'); return; }
  const rows=parseCSV(text);
  if(rows.length<2){ alert('That file has no data rows. Use the template.'); return; }
  const hdr=rows[0].map(h=>(h||'').trim().toLowerCase());
  const ci={first:hdr.indexOf('first_name'),last:hdr.indexOf('last_name'),email:hdr.indexOf('email'),email2:hdr.indexOf('email2'),ca:hdr.indexOf('content_area'),grade:hdr.indexOf('grade'),table:hdr.indexOf('table_no'),role:hdr.indexOf('role')};
  if(ci.email<0){ alert("CSV needs an 'email' column header. Download the template to see the format."); return; }
  const existing=new Set(sbPanelists.map(p=>(p.email||'').toLowerCase()));
  const toAdd=[]; let skipped=0;
  for(let r=1;r<rows.length;r++){
    const get=k=>ci[k]>=0?((rows[r][ci[k]]||'').trim()):'';
    const email=get('email'); if(!email){skipped++;continue;}
    if(existing.has(email.toLowerCase())){skipped++;continue;}
    existing.add(email.toLowerCase());
    const rlv=get('role').toLowerCase();
    const rl=(rlv==='group_facilitator')?'group_facilitator':((rlv==='facilitator'||rlv==='admin')?'facilitator':'panelist');
    toAdd.push({workshop_id:wid(),first_name:get('first'),last_name:get('last'),email,email2:get('email2')||null,content_area:get('ca'),grade:get('grade'),table_no:get('table'),role:rl,status:'active',group_id:groupIdFor(get('ca'),get('grade'))});
  }
  if(!toAdd.length){ alert('No new panelists to add — all already in the roster or missing an email ('+skipped+' skipped).'); return; }
  const {error}=await SB.from('panelists').insert(toAdd);
  if(error){ alert('Import failed: '+error.message); return; }
  await loadPanelistsSB(); render();
  alert('Added '+toAdd.length+' panelists'+(skipped?(' ('+skipped+' skipped as duplicates / no email)'):'')+'. No invites were sent.');
}

/* ---------- boot ---------- */
initBookmarks();
if(USE_SB){
  let entered=false;
  const enterIfSession = async (session)=>{
    if(entered || !session) return;
    entered=true;
    try{
      await loadFromSupabase();
      if(userRole){ enterApp(); }
      else { entered=false; showLogin(); }   // logged in but not on this workshop's roster
    }catch(e){ console.error(e); entered=false; showLogin(); }
  };
  // a magic-link / invite session can arrive a beat AFTER load — catch it here
  SB.auth.onAuthStateChange((_evt, session)=>{ if(session) enterIfSession(session); });
  (async ()=>{
    // PKCE-style links land with ?code=… that must be exchanged for a session
    try{
      const u=new URL(window.location.href);
      if(u.searchParams.get('code')){
        await SB.auth.exchangeCodeForSession(window.location.href);
        window.history.replaceState({}, document.title, u.pathname);  // tidy the URL
      }
    }catch(e){ console.error('link exchange', e); }
    const {data}=await SB.auth.getSession();
    if(data&&data.session){ await enterIfSession(data.session); }
    if(!entered){ showLogin(); }   // if a link is still resolving, onAuthStateChange will enter shortly
  })();
} else if(window.SUPABASE_CONFIG && window.SUPABASE_CONFIG.url){
  // DB was expected but the Supabase library didn't load (blocked CDN / offline)
  document.getElementById('loginScreen').style.display='flex';
  const note=document.getElementById('loginNote');
  if(note) note.innerHTML='⚠ Couldn&#699;t load the database. Check your internet connection (and any ad-blocker or school network filter), then <a href="#" onclick="location.reload();return false;"><b>reload this page</b></a>.';
} else {
  loadProgress();
  showLogin();
}
